name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements-test.txt
        pip install bitarray rich

    - name: Run fast tests (unit + integration)
      run: |
        python3.11 -m pytest tests/unit/ tests/integration/ -v --tb=short

    - name: Run all tests including system tests
      run: |
        python3.11 -m pytest tests/ -v --tb=short

    - name: Generate coverage report
      run: |
        python3.11 -m pytest tests/unit/ tests/integration/ --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 30
