name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Windows executable
      if: runner.os == 'Windows'
      run: |
        python build_windows_exe.py

    - name: Build macOS executable
      if: runner.os == 'macOS'
      run: |
        pyinstaller --onefile --name=FourInARow --console --add-data="opening_book_7x6.pkl.gz:." play_game_beautiful.py

    - name: Build Linux executable
      if: runner.os == 'Linux'
      run: |
        pyinstaller --onefile --name=FourInARow --console --add-data="opening_book_7x6.pkl.gz:." play_game_beautiful.py

    - name: Upload Windows Artifact
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v3
      with:
        name: FourInARow-Windows
        path: dist/FourInARow.exe

    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v3
      with:
        name: FourInARow-macOS
        path: dist/FourInARow

    - name: Upload Linux Artifact
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v3
      with:
        name: FourInARow-Linux
        path: dist/FourInARow
