name: Build Four-in-a-Row Apps

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Install dependencies (Windows)
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install bitarray
        if (Test-Path "requirements.txt") {
          pip install -r requirements.txt
        }

    # Install dependencies (macOS)
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        python3 -m pip install --upgrade pip
        pip3 install pyinstaller
        pip3 install bitarray
        if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi

    # Build (Windows) - with hidden imports and console mode
    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --onefile `
          --name=FourInARow `
          --console `
          --add-data "opening_book_7x6.json.gz;." `
          --hidden-import=bitarray `
          --hidden-import=bitarray.util `
          --hidden-import=collections.abc `
          --hidden-import=json `
          --hidden-import=gzip `
          play_game_beautiful.py

    # Build (macOS) - with hidden imports
    - name: Build (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --onefile \
          --name=FourInARow \
          --console \
          --add-data "opening_book_7x6.json.gz:." \
          --hidden-import=bitarray \
          --hidden-import=bitarray.util \
          --hidden-import=collections.abc \
          --hidden-import=json \
          --hidden-import=gzip \
          play_game_beautiful.py

    # Upload artifacts with better naming
    - uses: actions/upload-artifact@v4
      with:
        name: FourInARow-${{ runner.os }}
        path: |
          dist/FourInARow*
        retention-days: 30
