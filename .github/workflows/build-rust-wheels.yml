name: Build Rust Python Wheels

on:
  push:
    branches: [ main ]
    paths:
      - 'four_in_a_row_rust/**'
      - '.github/workflows/build-rust-wheels.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --manifest-path four_in_a_row_rust/Cargo.toml
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            # Limit to Python 3.11-3.13 to avoid PyO3 0.22 incompatibility with 3.14
            export PYO3_PYTHON=/opt/python/cp311-cp311/bin/python

      - name: List built wheels
        run: |
          ls -lh dist/
          file dist/*.whl

      - name: Copy wheel to wheels directory
        run: |
          mkdir -p wheels
          cp dist/*.whl wheels/

      - name: Commit wheel to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wheels/*.whl
          git diff --staged --quiet || git commit -m "Add Linux wheel from CI [skip ci]"
          git push

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl
