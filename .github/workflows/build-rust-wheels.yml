name: Build Rust Python Wheels

on:
  push:
    branches: [ main ]
    paths:
      - 'four_in_a_row_rust/**'
      - '.github/workflows/build-rust-wheels.yml'
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: four_in_a_row_rust
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out ../dist -i python3.11
          sccache: 'true'
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl
